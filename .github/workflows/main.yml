name: Build VitaHUD PAF

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure
        working-directory: VitaHUD_PAF_v1
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: VitaHUD_PAF_v1/build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          make VERBOSE=1
          ls -la

      - name: Package artifact
        working-directory: VitaHUD_PAF_v1
        run: |
          chmod +x package_artifact.sh
          ./package_artifact.sh
          ls -la build
          find build/VitaHUD_PAF_v3_package -type f -print || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaHUD-PAF-v3.1-package
          path: |
            VitaHUD_PAF_v1/build/vitahud_paf_v3.suprx
            VitaHUD_PAF_v1/build/VitaHUD_PAF_v3_package.zip
            VitaHUD_PAF_v1/build/VitaHUD_PAF_v3_package/**
