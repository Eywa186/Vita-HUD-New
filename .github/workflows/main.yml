name: Build VitaHUD PAF

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure
        working-directory: VitaHUD_PAF_v1
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: VitaHUD_PAF_v1/build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          make VERBOSE=1

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VitaHUD-PAF-v1-build
          path: |
            VitaHUD_PAF_v1/build/*.suprx
            VitaHUD_PAF_v1/build/*.elf
            VitaHUD_PAF_v1/build/*.velf
            VitaHUD_PAF_v1/build/*.self
