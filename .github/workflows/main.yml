name: Build VitaHUD PAF

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure
        working-directory: VitaHUD_PAF_v1
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DVITAHUD_USE_REAL_PAF=ON

      - name: Build
        working-directory: VitaHUD_PAF_v1/build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          make VERBOSE=1
          echo "Build directory:"
          ls -la

      - name: Package artifact
        working-directory: VitaHUD_PAF_v1
        run: |
          mkdir -p build/VitaHUD_PAF_v4_package/ur0/tai
          mkdir -p build/VitaHUD_PAF_v4_package/ur0/data/VitaHUD
          mkdir -p build/VitaHUD_PAF_v4_package/docs

          if [ -f build/vitahud_paf_v4.suprx ]; then
            cp build/vitahud_paf_v4.suprx build/VitaHUD_PAF_v4_package/ur0/tai/vitahud_paf_v4.suprx
          fi

          if [ -f build/vitahud_plugin.rco ]; then
            cp build/vitahud_plugin.rco build/VitaHUD_PAF_v4_package/ur0/data/VitaHUD/vitahud_plugin.rco
          fi

          if [ -d VitaHUD_Shell/RES_RCO ]; then
            cp -R VitaHUD_Shell/RES_RCO/* build/VitaHUD_PAF_v4_package/ur0/data/VitaHUD/ || true
          fi

          cat > build/VitaHUD_PAF_v4_package/INSTALL.txt <<'EOF'
          VitaHUD PAF v4 package

          Current status:
          - Real PAF mode test build.
          - This is expected to fail until real paf.h and PAF imports are added.

          Target paths later:
          ur0:tai/vitahud_paf_v4.suprx
          ur0:data/VitaHUD/vitahud_plugin.rco
          EOF

          cat > build/VitaHUD_PAF_v4_package/docs/STATUS.txt <<'EOF'
          VitaHUD PAF v4 status

          Testing:
          - VITAHUD_USE_REAL_PAF=ON

          Expected next issue:
          - Missing real paf.h
          - Missing PAF import libraries
          - Missing real RCO compiler/wiring
          EOF

          cd build
          tar -czf VitaHUD_PAF_v4_package.tar.gz VitaHUD_PAF_v4_package

          echo "Final build directory:"
          ls -la

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VitaHUD-PAF-v4-real-paf-test
          path: |
            VitaHUD_PAF_v1/build/vitahud_paf_v4.suprx
            VitaHUD_PAF_v1/build/VitaHUD_PAF_v4_package.tar.gz
            VitaHUD_PAF_v1/build/VitaHUD_PAF_v4_package/**
