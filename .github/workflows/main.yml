name: Build VitaHUD

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repo files
        run: |
          echo "Repo root:"
          ls -la
          echo "VitaHUD_PAF_v1:"
          ls -la VitaHUD_PAF_v1

      - name: Configure
        working-directory: VitaHUD_PAF_v1
        run: |
          cmake -S . -B build

      - name: Build
        working-directory: VitaHUD_PAF_v1
        run: |
          cmake --build build --verbose

      - name: Show build output
        run: |
          echo "Build folder:"
          ls -la VitaHUD_PAF_v1/build

      - name: Upload SUPRX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vitahud_paf_v5_suprx
          path: VitaHUD_PAF_v1/build/vitahud_paf_v5.suprx
