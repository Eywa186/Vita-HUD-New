name: Build VitaHUD PAF

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure
        working-directory: VitaHUD_PAF_v1
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: VitaHUD_PAF_v1/build
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          make VERBOSE=1
          echo "Build directory:"
          ls -la

      - name: Package artifact
        working-directory: VitaHUD_PAF_v1
        run: |
          mkdir -p build/VitaHUD_PAF_v3_package/ur0/tai
          mkdir -p build/VitaHUD_PAF_v3_package/ur0/data/VitaHUD
          mkdir -p build/VitaHUD_PAF_v3_package/docs

          if [ -f build/vitahud_paf_v3.suprx ]; then
            cp build/vitahud_paf_v3.suprx build/VitaHUD_PAF_v3_package/ur0/tai/vitahud_paf_v3.suprx
          fi

          if [ -d VitaHUD_Shell/RES_RCO ]; then
            cp -R VitaHUD_Shell/RES_RCO/* build/VitaHUD_PAF_v3_package/ur0/data/VitaHUD/ || true
          fi

          cat > build/VitaHUD_PAF_v3_package/INSTALL.txt <<'EOF'
          VitaHUD PAF v3 package

          Current status:
          - Compile/package test build.
          - Still uses paf_compat.h.
          - Not final real PAF overlay yet.

          Target paths later:
          ur0:tai/vitahud_paf_v3.suprx
          ur0:data/VitaHUD/
          EOF

          cat > build/VitaHUD_PAF_v3_package/docs/STATUS.txt <<'EOF'
          VitaHUD PAF v3 status

          Working:
          - GitHub Actions build
          - VitaSDK compile
          - Clean SUPRX artifact
          - Package folder output

          Not final:
          - Real PAF headers/imports
          - Real RCO compile
          - Real visible overlay
          EOF

          cd build
          zip -r VitaHUD_PAF_v3_package.zip VitaHUD_PAF_v3_package

          echo "Final build directory:"
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaHUD-PAF-v3.1-package
          path: |
            VitaHUD_PAF_v1/build/vitahud_paf_v3.suprx
            VitaHUD_PAF_v1/build/VitaHUD_PAF_v3_package.zip
            VitaHUD_PAF_v1/build/VitaHUD_PAF_v3_package/**
