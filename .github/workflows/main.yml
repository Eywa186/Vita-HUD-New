name: Build VitaHUD

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repo files
        run: |
          echo "Repo root:"
          ls -la
          echo "VitaHUD_PAF_v1:"
          ls -la VitaHUD_PAF_v1

      - name: Configure
        working-directory: VitaHUD_PAF_v1
        run: |
          cmake -S . -B build

      - name: Build
        working-directory: VitaHUD_PAF_v1
        run: |
          cmake --build build --verbose

      - name: Package
        working-directory: VitaHUD_PAF_v1
        run: |
          chmod +x package_artifact.sh
          ./package_artifact.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VitaHUD_PAF_v5_package
          path: VitaHUD_PAF_v1/build/VitaHUD_PAF_v5_package
