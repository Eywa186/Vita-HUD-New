      - name: Prepare v5 source from ZIP
        run: |
          echo "Repo root:"
          ls -la

          rm -rf VitaHUD_PAF_v1_extracted

          cmake -E tar xf VitaHUD_PAF_v5_vdsuite_real_paf_probe.zip --format=zip

          echo "After extracting:"
          ls -la

          if [ -d VitaHUD_PAF_v5_vdsuite_real_paf_probe ]; then
            rm -rf VitaHUD_PAF_v1
            mv VitaHUD_PAF_v5_vdsuite_real_paf_probe VitaHUD_PAF_v1
          else
            echo "ERROR: extracted folder VitaHUD_PAF_v5_vdsuite_real_paf_probe not found"
            find . -maxdepth 2 -type d -print
            exit 1
          fi

          echo "Prepared VitaHUD_PAF_v1:"
          ls -la VitaHUD_PAF_v1
